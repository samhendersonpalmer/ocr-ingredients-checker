[server]
enableStaticServing = true

[[theme.fontFaces]]
family = "GolosText"
url = "app/static/Golos_Family/GolosText-Regular.ttf"
style = "normal"
weight = 400

[[theme.fontFaces]]
family = "GolosText"
url = "app/static/Golos_Family/GolosText-Medium.ttf"
style = "normal"
weight = 500

[[theme.fontFaces]]
family = "GolosTextSemi"
url = "app/static/Golos_Family/GolosText-SemiBold.ttf"
style = "normal"
weight = 600

[[theme.fontFaces]]
family = "GolosTextBold"
url = "app/static/Golos_Family/GolosText-Bold.ttf"
style = "normal"
weight = 700



[theme]
primaryColor = "#215F9A"             # Medical blue - trust, reliability, clinical
backgroundColor = "#fafbfc"          # Off-white - clinical clean but not harsh
secondaryBackgroundColor = "#f4f6f8" # Light gray-blue - subtle medical feel
textColor = "#000000"                # Dark blue-gray - highly readable, professional
linkColor = "#0052a3"                # Darker medical blue for links
borderColor = "#dee2e6"              # Soft gray borders - clean definition
showWidgetBorder = true
baseRadius = "0.25rem"               # Minimal rounding - clinical precision
font = "GolosText"                 
headingFont = "GolosTextSemi"          # Consistent typography hierarchy
headingFontSizes = ["4.25rem", "3rem", "2rem"]
codeFont = "GolosText"             
codeBackgroundColor = "#f1f3f4"      # Very light gray for code
showSidebarBorder = true

[theme.sidebar]
backgroundColor = "#f1f4f7"          # Soft blue-gray - calming sidebar
secondaryBackgroundColor = "#e8ecf1" # Slightly darker for sections

